<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HackEmpire X — {% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; color: #c9d1d9; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { color: #58a6ff !important; font-weight: 700; letter-spacing: 1px; }
    .nav-link { color: #8b949e !important; }
    .nav-link:hover, .nav-link.active { color: #58a6ff !important; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #1c2128; border-bottom: 1px solid #30363d; font-weight: 600; }
    .table { color: #c9d1d9; }
    .table thead th { border-color: #30363d; color: #8b949e; font-size: .8rem; text-transform: uppercase; }
    .table td, .table th { border-color: #21262d; }
    .badge-critical { background: #da3633; }
    .badge-high    { background: #d29922; }
    .badge-medium  { background: #388bfd; }
    .badge-low     { background: #3fb950; }
    .stat-card .display-6 { color: #58a6ff; }
    pre { background: #0d1117; color: #3fb950; font-size: .78rem; padding: 1rem; border-radius: 6px; max-height: 500px; overflow-y: auto; }
    /* Attack tree */
    .tree ul { list-style: none; padding-left: 1.4rem; border-left: 1px dashed #30363d; margin: 0; }
    .tree li { padding: .2rem 0; }
    .tree > ul { border-left: none; padding-left: 0; }
    .tree-node { cursor: default; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard">&#9760; HackEmpire X</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/dashboard' or request.path == '/' %}active{% endif %}" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/logs' %}active{% endif %}" href="/logs">Logs</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/report' %}active{% endif %}" href="/report">Report</a></li>
        <li class="nav-item"><a class="nav-link" href="/api/report/json">&#8659; JSON</a></li>
        <li class="nav-item"><a class="nav-link" href="/api/report/pdf">&#8659; PDF</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
