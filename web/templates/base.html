<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HackEmpire X — {% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="/static/hacker-theme.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand glitch" data-text="⬡ HACKEMPIRE X" href="/dashboard">⬡ HACKEMPIRE X</a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <span id="nav-status" class="pulse" style="font-size:.65rem;color:var(--accent);letter-spacing:1px;">● LIVE</span>
      <a class="nav-link {% if request.path=='/dashboard' or request.path=='/' %}active{% endif %}" href="/dashboard">DASHBOARD</a>
      <a class="nav-link {% if request.path=='/logs' %}active{% endif %}" href="/logs">LOGS</a>
      <a class="nav-link {% if request.path=='/report' %}active{% endif %}" href="/report">REPORT</a>
      <a class="nav-link" href="/api/report/json">↓ JSON</a>
      <a class="nav-link" href="/api/report/pdf">↓ PDF</a>
    </div>
  </div>
</nav>
<div class="container-fluid py-3 px-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
